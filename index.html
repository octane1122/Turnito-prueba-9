<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TurnitoArg ULTRA</title>

<!-- Firebase v8 (CDN estable, sin módulos) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;text-align:center}
button,input{padding:10px;margin:5px;border-radius:8px}
button{background:#22c55e;border:none;cursor:pointer}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
#chatBox{position:fixed;bottom:0;width:100%;background:#111;display:none}
</style>
</head>

<body>

<h1>⚽ TurnitoArg ULTRA</h1>

<div id="authDiv">
  <input id="email" type="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Ingresar</button>
</div>

<div id="appDiv" style="display:none">
  <button onclick="logout()">Salir</button>

  <h2>Crear Partido</h2>
  <input id="zona" placeholder="Zona">
  <input id="fecha" type="date">
  <input id="hora" type="time">
  <button onclick="crearPartido()">Crear</button>

  <div id="partidos"></div>
  <div id="ranking"></div>
</div>

<div id="chatBox">
  <div id="mensajes" style="max-height:150px;overflow-y:auto;padding:5px"></div>
  <input id="msg" placeholder="Mensaje">
  <button onclick="sendMsg()">Enviar</button>
  <button onclick="cerrarChat()">Cerrar</button>
</div>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyDIuuojNXzkSh4RR4Adwkm1uWEjUZ2aP2w",
    authDomain: "turnitoarg-7ace7.firebaseapp.com",
    projectId: "turnitoarg-7ace7",
    storageBucket: "turnitoarg-7ace7.firebasestorage.app",
    messagingSenderId: "793271454131",
    appId: "1:793271454131:web:f0224ce0646a2beaf363c6"
  };

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();

  var unsubMatches = null;
  var unsubChat = null;
  var currentMatch = null;

  // ---- AUTH ----
  function register() {
    var emailVal = document.getElementById("email").value;
    var passVal = document.getElementById("pass").value;

    auth.createUserWithEmailAndPassword(emailVal, passVal)
      .then(function(cred) {
        return db.collection("users").doc(cred.user.uid).set({
          email: cred.user.email,
          partidos: 0,
          ganados: 0,
          perdidos: 0,
          rating: 1000
        });
      })
      .then(function() { alert("¡Registrado correctamente!"); })
      .catch(function(e) { console.error(e); alert(e.message); });
  }

  function login() {
    var emailVal = document.getElementById("email").value;
    var passVal = document.getElementById("pass").value;

    auth.signInWithEmailAndPassword(emailVal, passVal)
      .catch(function(e) { console.error(e); alert(e.message); });
  }

  function logout() {
    auth.signOut();
  }

  auth.onAuthStateChanged(function(user) {
    if (user) {
      document.getElementById("authDiv").style.display = "none";
      document.getElementById("appDiv").style.display = "block";
      cargarPartidos();
      cargarRanking();
    } else {
      document.getElementById("authDiv").style.display = "block";
      document.getElementById("appDiv").style.display = "none";
    }
  });

  // ---- CREAR PARTIDO ----
  function crearPartido() {
    db.collection("partidos").add({
      zona: document.getElementById("zona").value,
      fecha: document.getElementById("fecha").value,
      hora: document.getElementById("hora").value,
      jugadores: [auth.currentUser.uid],
      teamA: [],
      teamB: [],
      votos: [],
      resultadoFinal: null,
      max: 10,
      creador: auth.currentUser.uid
    });
  }

  // ---- LISTA PARTIDOS ----
  function cargarPartidos() {
    if (unsubMatches) unsubMatches();

    unsubMatches = db.collection("partidos").orderBy("fecha").onSnapshot(function(snap) {
      document.getElementById("partidos").innerHTML = "";

      snap.forEach(function(d) {
        var p = d.data();
        var id = d.id;
        var estoy = p.jugadores.indexOf(auth.currentUser.uid) !== -1;
        var lleno = p.jugadores.length >= p.max;

        var html = '<div class="card">';
        html += '<b>' + p.zona + '</b> ' + p.fecha + ' ' + p.hora + '<br>';
        html += '👥 ' + p.jugadores.length + '/' + p.max + '<br>';
        html += '🅰 ' + p.teamA.length + ' vs 🅱 ' + p.teamB.length + '<br>';
        if (p.resultadoFinal) html += '🏁 ' + p.resultadoFinal + '<br>';
        if (!estoy && !lleno) html += '<button onclick="join(\'' + id + '\')">Entrar</button>';
        if (estoy) html += '<button onclick="leave(\'' + id + '\')">Salir</button>';
        html += '<button onclick="equipo(\'' + id + '\',\'A\')">Equipo A</button>';
        html += '<button onclick="equipo(\'' + id + '\',\'B\')">Equipo B</button>';
        html += '<button onclick="abrirChat(\'' + id + '\')">Chat</button>';
        html += '<button onclick="votar(\'' + id + '\')">Votar</button>';
        html += '<button onclick="resolver(\'' + id + '\')">Resolver</button>';
        html += '</div>';

        document.getElementById("partidos").innerHTML += html;
      });
    });
  }

  // ---- JOIN / LEAVE ----
  function join(id) {
    var ref = db.collection("partidos").doc(id);
    ref.get().then(function(snap) {
      var p = snap.data();
      if (p.jugadores.length >= p.max) return;
      if (p.jugadores.indexOf(auth.currentUser.uid) !== -1) return;
      ref.update({ jugadores: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid) });
    });
  }

  function leave(id) {
    db.collection("partidos").doc(id).update({
      jugadores: firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid),
      teamA: firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid),
      teamB: firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid)
    });
  }

  // ---- EQUIPOS ----
  function equipo(id, t) {
    var ref = db.collection("partidos").doc(id);
    ref.update({
      teamA: t === "A"
        ? firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
        : firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid),
      teamB: t === "B"
        ? firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
        : firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid)
    });
  }

  // ---- CHAT ----
  function abrirChat(id) {
    currentMatch = id;
    document.getElementById("chatBox").style.display = "block";

    if (unsubChat) unsubChat();

    unsubChat = db.collection("partidos/" + id + "/chat").onSnapshot(function(snap) {
      document.getElementById("mensajes").innerHTML = "";
      snap.forEach(function(m) {
        var d = m.data();
        document.getElementById("mensajes").innerHTML += '<div>' + d.user + ': ' + d.text + '</div>';
      });
    });
  }

  function cerrarChat() {
    document.getElementById("chatBox").style.display = "none";
    if (unsubChat) { unsubChat(); unsubChat = null; }
  }

  function sendMsg() {
    var msgVal = document.getElementById("msg").value;
    if (!msgVal) return;
    db.collection("partidos/" + currentMatch + "/chat").add({
      user: auth.currentUser.email,
      text: msgVal,
      ts: Date.now()
    });
    document.getElementById("msg").value = "";
  }

  // ---- VOTAR ----
  function votar(id) {
    var r = prompt("Resultado A-B (ej: 3-2)");
    if (!r) return;
    db.collection("partidos").doc(id).update({
      votos: firebase.firestore.FieldValue.arrayUnion({ uid: auth.currentUser.uid, res: r })
    });
  }

  // ---- RESOLVER ----
  function resolver(id) {
    var ref = db.collection("partidos").doc(id);
    ref.get().then(function(snap) {
      var p = snap.data();
      var conteo = {};
      p.votos.forEach(function(v) { conteo[v.res] = (conteo[v.res] || 0) + 1; });

      var best = null, max = 0;
      for (var r in conteo) {
        if (conteo[r] > max) { max = conteo[r]; best = r; }
      }

      if (max <= p.jugadores.length / 2) return alert("Sin consenso todavía");

      ref.update({ resultadoFinal: best });

      var partes = best.split("-").map(Number);
      var ganaA = partes[0] > partes[1];

      var updates = p.jugadores.map(function(uid) {
        return db.collection("users").doc(uid).get().then(function(usnap) {
          var u = usnap.data();
          var esA = p.teamA.indexOf(uid) !== -1;
          var win = (esA && ganaA) || (!esA && !ganaA);
          return db.collection("users").doc(uid).update({
            partidos: u.partidos + 1,
            ganados: u.ganados + (win ? 1 : 0),
            perdidos: u.perdidos + (win ? 0 : 1),
            rating: u.rating + (win ? 15 : -10)
          });
        });
      });

      Promise.all(updates).then(function() { alert("Stats actualizadas ✅"); });
    });
  }

  // ---- RANKING ----
  function cargarRanking() {
    db.collection("users").onSnapshot(function(snap) {
      document.getElementById("ranking").innerHTML = "<h3>🏆 Ranking</h3>";
      var jugadores = [];
      snap.forEach(function(u) { jugadores.push(u.data()); });
      jugadores.sort(function(a, b) { return b.rating - a.rating; });
      jugadores.forEach(function(d) {
        document.getElementById("ranking").innerHTML += d.email + ' ⭐ ' + d.rating + '<br>';
      });
    });
  }
</script>

</body>
</html>
